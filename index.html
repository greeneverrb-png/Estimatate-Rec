<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estimate Record</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #eaeaea;
}

.container {
  padding: 20px;
}

h2 {
  background: green;
  color: white;
  padding: 15px;
  margin: 0 -20px 20px -20px;
  text-align: center;
}

input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  font-size: 16px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
  background: green;
  color: white;
  border: none;
  border-radius: 8px;
}

button:active {
  transform: scale(0.97);
}

.show-btn {
  background: #333;
}
</style>
</head>

<body>

<div class="container">
<h2>Estimate Record</h2>

<input type="number" inputmode="numeric" id="cash" placeholder="Cash">
<input type="number" inputmode="numeric" id="online" placeholder="Online">
<input type="date" id="date">

<button onclick="addRecord()">ENTER</button>
<button class="show-btn" onclick="goRecord()">SHOW RECORD</button>
</div>

<script>
// ✅ Correct Nepal date
window.onload = function () {
  const today = new Date().toLocaleDateString('en-CA');
  document.getElementById("date").value = today;
};

function addRecord() {
  const cash = Number(document.getElementById("cash").value) || 0;
  const online = Number(document.getElementById("online").value) || 0;
  const date = document.getElementById("date").value;

  if (!date) {
    alert("Please select date");
    return;
  }

  const total = cash + online;

  const record = { cash, online, total, date };

  let records = JSON.parse(localStorage.getItem("records")) || [];
  records.push(record);

  localStorage.setItem("records", JSON.stringify(records));

  alert("Saved!");

  document.getElementById("cash").value = "";
  document.getElementById("online").value = "";

  document.getElementById("date").value =
    new Date().toLocaleDateString('en-CA');
}

function goRecord() {
  window.location.href = "record.html";
}
</script>

</body>
</html>
