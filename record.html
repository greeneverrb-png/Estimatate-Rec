<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report</title>

<style>
body { margin:0; font-family:Arial; background:#eaeaea; }
.container { padding:20px; }
h2 { background: green; color:white; padding:15px; margin:0 -20px 20px -20px; text-align:center; }

table { width:100%; border-collapse: collapse; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }

.wrapper { overflow-x:auto; }

.box, .category { margin-top:20px; padding:15px; background:#fff; border-radius:8px; }

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:5px 0;
}

button {
  padding:6px 10px;
  background:green;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.fullbtn {
  width:100%;
  margin-top:10px;
  padding:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="container">

<h2>Report</h2>

<h3>Last 7 Days</h3>
<div class="wrapper">
<table id="preview">
<thead>
<tr><th>Cash</th><th>Online</th><th>Total</th><th>Date</th></tr>
</thead>
<tbody></tbody>
</table>
</div>

<div class="box">
<h3>This Month</h3>
<p>Cash: <span id="mcash">0</span></p>
<p>Online: <span id="monline">0</span></p>
<p>Total: <span id="mtotal">0</span></p>
</div>

<!-- ✅ Categories -->
<div class="category">
<h3>Auto Categories</h3>

<div class="row">Petrol: <span id="petrol">0</span> <button onclick="useAmount('petrol')">Use</button></div>
<div class="row">Loan: <span id="loan">0</span> <button onclick="useAmount('loan')">Use</button></div>
<div class="row">Maintain: <span id="maintain">0</span> <button onclick="useAmount('maintain')">Use</button></div>
<div class="row">Renewal: <span id="renewal">0</span> <button onclick="useAmount('renewal')">Use</button></div>
<div class="row">Expense: <span id="exp">0</span> <button onclick="useAmount('exp')">Use</button></div>
<div class="row">Saving: <span id="saving">0</span> <button onclick="useAmount('saving')">Use</button></div>

<hr>

<!-- ✅ Remaining Added -->
<div class="row"><strong>Remaining:</strong> <span id="remaining">0</span></div>

</div>

<button class="fullbtn" onclick="toggleAll()">All Record</button>
<div id="all" class="hidden"></div>

<button class="fullbtn" onclick="goBack()">Back</button>

</div>

<script>
const records = JSON.parse(localStorage.getItem("records")) || [];

const today = new Date();
const last7 = new Date();
last7.setDate(today.getDate() - 7);

// ===== Last 7 days =====
const preview = document.querySelector("#preview tbody");

records.forEach(r => {
  const d = new Date(r.date);
  if (d >= last7 && d <= today) {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${r.cash}</td>
      <td>${r.online}</td>
      <td>${r.total}</td>
      <td>${r.date}</td>
    `;
    preview.appendChild(row);
  }
});

// ===== This Month =====
let mc=0, mo=0;

records.forEach(r => {
  const d = new Date(r.date);
  if (d.getMonth()===today.getMonth() && d.getFullYear()===today.getFullYear()) {
    mc += Number(r.cash) || 0;
    mo += Number(r.online) || 0;
  }
});

const mtotal = mc + mo;

document.getElementById("mcash").innerText = mc;
document.getElementById("monline").innerText = mo;
document.getElementById("mtotal").innerText = mtotal;

// ===== Categories =====
const categoryPercent = {
  petrol: 0.25,
  loan: 0.30,
  maintain: 0.08,
  renewal: 0.05,
  exp: 0.10,
  saving: 0.22
};

let remaining = mtotal;

for (let key in categoryPercent) {
  const val = (mtotal * categoryPercent[key]).toFixed(2);
  document.getElementById(key).innerText = val;
}

document.getElementById("remaining").innerText = remaining.toFixed(2);

// ===== Use Button Logic =====
function useAmount(type){
  const val = Number(document.getElementById(type).innerText);

  if(val <= 0) return;

  remaining -= val;

  // set used category to 0
  document.getElementById(type).innerText = "0";

  if(remaining < 0) remaining = 0;

  document.getElementById("remaining").innerText = remaining.toFixed(2);
}

// ===== All Records =====
const grouped = {};
records.forEach(r => {
  const d = new Date(r.date);
  const key = d.toLocaleString('default',{month:'long',year:'numeric'});
  if (!grouped[key]) grouped[key]=[];
  grouped[key].push(r);
});

const allDiv = document.getElementById("all");

for (let key in grouped) {
  let html = `<div class="box"><h3>${key}</h3><div class="wrapper"><table>
  <tr><th>Cash</th><th>Online</th><th>Total</th><th>Date</th></tr>`;

  grouped[key].forEach(r=>{
    html += `<tr>
      <td>${r.cash}</td>
      <td>${r.online}</td>
      <td>${r.total}</td>
      <td>${r.date}</td>
    </tr>`;
  });

  html += "</table></div></div>";
  allDiv.innerHTML += html;
}

function toggleAll(){
  document.getElementById("all").classList.toggle("hidden");
}

function goBack(){
  window.history.back();
}
</script>

</body>
</html>
